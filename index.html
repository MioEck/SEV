<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SEV Fahrtbericht</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --primary: #00c8e8;
    --primary-dark: #0099bb;
    --orange: #ff8c1a;
    --dark: #0a1628;
    --navy: #132843;
    --bg: #0d1e35;
    --card: #1a3350;
    --border: #1e4070;
    --text: #e0f0f8;
    --muted: #6a9ab8;
    --green: #00c87a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0a1628 0%, #0f2744 100%);
    color: white;
    padding: 14px 16px 12px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(0,200,232,0.15);
    border-bottom: 1px solid rgba(0,200,232,0.2);
  }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.02em; color: var(--primary); }
  header span { font-size: 12px; opacity: 0.85; color: var(--primary); }

  nav {
    display: flex;
    background: var(--navy);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 56px; z-index: 99;
  }
  nav button {
    flex: 1; padding: 11px 4px; border: none; background: none;
    font-size: 12px; color: var(--muted); cursor: pointer;
    border-bottom: 3px solid transparent; font-weight: 600;
    letter-spacing: 0.03em; transition: all 0.15s;
  }
  nav button.active { color: var(--primary); border-bottom-color: var(--primary); }

  main { padding: 14px 12px 100px; max-width: 600px; margin: 0 auto; }

  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--primary); text-transform: uppercase;
    margin: 18px 0 10px; padding-left: 2px;
  }

  .field { margin-bottom: 13px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 15px; background: var(--navy); color: var(--text);
    -webkit-appearance: none; outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0,200,232,0.15); }
  .field textarea { resize: vertical; min-height: 70px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .calc-box {
    background: rgba(0,200,232,0.08); border: 1px solid rgba(0,200,232,0.25); border-radius: 8px;
    padding: 10px 14px; font-size: 13px; color: var(--primary);
    font-weight: 600; margin-bottom: 12px;
  }

  .fahrt-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .fahrt-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .fahrt-nr { font-size: 12px; font-weight: 700; color: var(--orange); letter-spacing: 0.08em; }
  .btn-del {
    background: none; border: none; color: var(--muted); font-size: 18px;
    cursor: pointer; padding: 2px 6px; border-radius: 4px;
    transition: color 0.15s;
  }
  .btn-del:hover { color: #ff4444; }

  .btn-add {
    width: 100%; padding: 13px; background: none;
    border: 2px dashed var(--primary); border-radius: 10px;
    color: var(--primary); font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.05em;
    transition: background 0.15s;
  }
  .btn-add:hover { background: rgba(0,200,232,0.08); }

  .preview-card {
    background: var(--card); border-radius: 10px; padding: 14px;
    margin-bottom: 12px; border: 1px solid var(--border);
  }
  .preview-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .preview-row:last-child { border-bottom: none; }
  .preview-row .pk { color: var(--muted); flex-shrink: 0; margin-right: 12px; }
  .preview-row .pv { font-weight: 500; text-align: right; }

  .fahrt-preview {
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .fahrt-preview:last-child { border-bottom: none; }
  .fahrt-preview .fp-route { font-weight: 500; }
  .fahrt-preview .fp-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--navy); border-top: 1px solid var(--border);
    padding: 10px 12px; display: flex; gap: 10px;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.4);
  }
  .btn-save {
    flex: 1; padding: 13px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: var(--dark); border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-save.saved { background: var(--green); color: white; }
  .btn-pdf {
    padding: 13px 16px;
    background: linear-gradient(135deg, var(--orange) 0%, #cc6a00 100%);
    color: white; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.03em;
  }
  .btn-reset {
    padding: 13px 14px; background: none; color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px; font-size: 13px;
    cursor: pointer;
  }

  .tab { display: none; }
  .tab.active { display: block; }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: var(--primary);
    border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .loading {
    text-align: center; padding: 30px; color: var(--muted); font-size: 14px;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>SEV Fahrtbericht</h1>
    <div style="font-size:10px;opacity:0.7">v4.6</div>
  </div>
  <span id="umlauf-display">4208-809</span>
</header>

<nav>
  <button class="active" onclick="switchTab('kopf',this)">Kopfdaten</button>
  <button onclick="switchTab('fahrten',this)">Fahrten</button>
  <button onclick="switchTab('vorschau',this)">Vorschau</button>
</nav>

<main>

<!-- TAB: KOPFDATEN -->
<div id="tab-kopf" class="tab active">

  <div class="section-title">Tages-PDF</div>
  <div id="pdf-upload-area" style="margin-bottom:16px">
    <label for="pdf-upload" style="display:block;cursor:pointer">
      <div id="pdf-upload-box" style="border:2px dashed #00c8e8;border-radius:10px;padding:16px;text-align:center;font-size:13px;color:#00c8e8;transition:all 0.2s;background:#132843">
        <div style="font-size:24px;margin-bottom:4px">📄</div>
        <div id="pdf-upload-label">✓ Standard-Vorlage aktiv · Antippen zum Ersetzen</div>
      </div>
    </label>
    <input type="file" id="pdf-upload" accept="application/pdf" style="display:none" onchange="loadPDF(this)">
    <button id="btn-reset-vorlage" onclick="resetVorlage()" style="display:none;margin-top:8px;width:100%;padding:8px;background:none;border:1px solid #1e4070;border-radius:8px;color:#6a9ab8;font-size:12px;cursor:pointer">
      ↩ Zurück zur Standard-Vorlage
    </button>
  </div>

  <div class="section-title">Auftrag</div>
  <div class="grid2">
    <div class="field"><label>Datum</label><input type="date" id="datum" oninput="save()"></div>
    <div class="field"><label>Fplo</label><input type="text" id="fplo" oninput="save()"></div>
  </div>
  <div class="grid2">
    <div class="field"><label>Umlauf</label><input type="text" id="umlauf" oninput="save(); document.getElementById('umlauf-display').textContent=this.value||'—'"></div>
    <div class="field"><label>Fahrauftrag</label><input type="text" id="fahrauftrag" oninput="save()"></div>
  </div>

  <div class="section-title">Fahrzeug</div>
  <div class="grid2">
    <div class="field"><label>Kennzeichen</label><input type="text" id="kennzeichen" placeholder="SL-XX 123" oninput="save()"></div>
    <div class="field"><label>Sitz+Stehplätze</label><input type="number" id="sitzplaetze" placeholder="z.B. 57" oninput="save()"></div>
  </div>

  <div class="section-title">Zeiten</div>
  <div class="grid2">
    <div class="field"><label>Beginn</label><input type="time" id="beginn" oninput="save(); calcZeit()"></div>
    <div class="field"><label>Ende</label><input type="time" id="ende" oninput="save(); calcZeit()"></div>
  </div>
  <div id="gesamtzeit-box" class="calc-box" style="display:none"></div>

  <div class="section-title">Kilometer</div>
  <div class="grid2">
    <div class="field"><label>Km-Anfang</label><input type="number" id="km_anfang" oninput="save(); calcKm()"></div>
    <div class="field"><label>Km-Ende</label><input type="number" id="km_ende" oninput="save(); calcKm()"></div>
  </div>
  <div id="km-box" class="calc-box" style="display:none"></div>

  <div class="section-title">Beförderte Personen</div>
  <div class="field"><input type="number" id="bef_personen" placeholder="Gesamtanzahl" oninput="save()"></div>

  <div class="section-title">Besondere Vorkommnisse</div>
  <div class="field"><textarea id="vorkommnisse" placeholder="Leer lassen wenn keine" oninput="save()"></textarea></div>

</div>

<!-- TAB: FAHRTEN -->
<div id="tab-fahrten" class="tab">
  <div id="fahrten-container"></div>
  <button class="btn-add" onclick="addFahrt()">＋ FAHRT HINZUFÜGEN</button>
</div>

<!-- TAB: VORSCHAU -->
<div id="tab-vorschau" class="tab">
  <div class="section-title">Kopfdaten</div>
  <div class="preview-card" id="preview-kopf"></div>
  <div class="section-title">Fahrten</div>
  <div class="preview-card" id="preview-fahrten"></div>
  <div class="section-title">Vorkommnisse</div>
  <div class="preview-card" id="preview-vorkommnisse"></div>
</div>

</main>

<footer>
  <button class="btn-save" id="btn-save" onclick="saveManual()">SPEICHERN</button>
  <button class="btn-pdf" onclick="generatePDF()">PDF</button>
  <button class="btn-reset" onclick="resetAll()">✕</button>
</footer>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
// ── Data ────────────────────────────────────────────────────────────────────
const KEY = 'sev_fahrtbericht_v1';
let data = load();

function defaultData() {
  return {
    datum: '', fplo: '', umlauf: '',
    fahrauftrag: '', kennzeichen: '', sitzplaetze: '',
    beginn: '', ende: '', km_anfang: '', km_ende: '',
    bef_personen: '', vorkommnisse: '',
    fahrten: [newFahrt()]
  };
}
function newFahrt() {
  return { id: Date.now(), abfahrt: '', strecke: '', ankunft: '', km: '', personen: '' };
}
function load() {
  try { const d = localStorage.getItem(KEY); return d ? JSON.parse(d) : defaultData(); }
  catch { return defaultData(); }
}
function save() {
  collectFromDOM();
  localStorage.setItem(KEY, JSON.stringify(data));
}

// ── DOM sync ─────────────────────────────────────────────────────────────────
const FIELDS = ['datum','fplo','umlauf','fahrauftrag','kennzeichen','sitzplaetze',
                'beginn','ende','km_anfang','km_ende','bef_personen','vorkommnisse'];

function collectFromDOM() {
  FIELDS.forEach(f => { const el = document.getElementById(f); if (el) data[f] = el.value; });
  data.fahrten = Array.from(document.querySelectorAll('.fahrt-card')).map(card => {
    const id = card.dataset.id;
    return {
      id, abfahrt: card.querySelector('.f-abfahrt').value,
      strecke: card.querySelector('.f-strecke').value,
      ankunft: card.querySelector('.f-ankunft').value,
      km: card.querySelector('.f-km').value,
      personen: card.querySelector('.f-personen').value
    };
  });
}

function fillDOM() {
  FIELDS.forEach(f => { const el = document.getElementById(f); if (el) el.value = data[f] || ''; });
  document.getElementById('umlauf-display').textContent = data.umlauf || '—';
  renderFahrten();
  calcZeit(); calcKm();
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(id, btn) {
  save();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'vorschau') renderPreview();
}

// ── Calculations ──────────────────────────────────────────────────────────────
function calcZeit() {
  const b = document.getElementById('beginn').value;
  const e = document.getElementById('ende').value;
  const box = document.getElementById('gesamtzeit-box');
  if (!b || !e) { box.style.display = 'none'; return; }
  const [bh,bm] = b.split(':').map(Number);
  const [eh,em] = e.split(':').map(Number);
  let min = (eh*60+em) - (bh*60+bm);
  if (min < 0) min += 1440;
  box.style.display = 'block';
  box.textContent = `Gesamtzeit: ${Math.floor(min/60)}h ${min%60}min`;
}

function calcKm() {
  const a = parseInt(document.getElementById('km_anfang').value);
  const e = parseInt(document.getElementById('km_ende').value);
  const box = document.getElementById('km-box');
  if (isNaN(a) || isNaN(e)) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  box.textContent = `Km gesamt: ${e - a} km`;
}

function getGesamtzeit() {
  const b = data.beginn, e = data.ende;
  if (!b || !e) return '';
  const [bh,bm] = b.split(':').map(Number);
  const [eh,em] = e.split(':').map(Number);
  let min = (eh*60+em) - (bh*60+bm);
  if (min < 0) min += 1440;
  return `${Math.floor(min/60)}h ${min%60}min`;
}
function getKmGesamt() {
  const a = parseInt(data.km_anfang), e = parseInt(data.km_ende);
  return (!isNaN(a) && !isNaN(e)) ? String(e - a) : '';
}

// ── Fahrten ───────────────────────────────────────────────────────────────────
function reverseRoute(strecke) {
  if (!strecke) return '';
  // Trennzeichen erkennen: ' - ', ' – ', ', ', '. ', '  ' oder einfach Leerzeichen in der Mitte
  const separators = [' - ', ' – ', ', ', '. '];
  for (const sep of separators) {
    const idx = strecke.indexOf(sep);
    if (idx > 0) {
      return strecke.slice(idx + sep.length) + sep + strecke.slice(0, idx);
    }
  }
  // Fallback: Leerzeichen in der Mitte
  const mid = Math.floor(strecke.length / 2);
  const spaceAfter = strecke.indexOf(' ', mid);
  const spaceBefore = strecke.lastIndexOf(' ', mid);
  const split = (spaceAfter >= 0 && (spaceBefore < 0 || spaceAfter - mid < mid - spaceBefore))
    ? spaceAfter : spaceBefore;
  if (split > 0) return strecke.slice(split + 1) + ' ' + strecke.slice(0, split);
  return '';
}

function autoSumPersonen() {
  const total = data.fahrten.reduce((sum, f) => sum + (parseInt(f.personen) || 0), 0);
  if (total > 0) {
    data.bef_personen = String(total);
    const el = document.getElementById('bef_personen');
    if (el) el.value = total;
  }
}

function renderFahrten() {
  const c = document.getElementById('fahrten-container');
  c.innerHTML = '';
  data.fahrten.forEach((f, i) => c.appendChild(makeFahrtCard(f, i)));
}

function makeFahrtCard(f, i) {
  const prev = i > 0 ? data.fahrten[i - 1] : null;
  const suggestion = prev ? reverseRoute(prev.strecke) : '';
  const div = document.createElement('div');
  div.className = 'fahrt-card';
  div.dataset.id = f.id;
  div.innerHTML = `
    <div class="fahrt-header">
      <span class="fahrt-nr">FAHRT ${i+1}</span>
      <button class="btn-del" onclick="deleteFahrt('${f.id}')">✕</button>
    </div>
    <div class="grid2">
      <div class="field"><label>Abfahrt</label><input type="time" class="f-abfahrt" value="${f.abfahrt||''}" oninput="save()"></div>
      <div class="field"><label>Ankunft</label><input type="time" class="f-ankunft" value="${f.ankunft||''}" oninput="save()"></div>
    </div>
    <div class="field">
      <label>Strecke (von – nach)</label>
      <input type="text" class="f-strecke" value="${f.strecke||''}" placeholder="z.B. Flensburg – Schleswig" oninput="save()">
      ${suggestion && !f.strecke ? `<button type="button" style="margin-top:5px;width:100%;padding:7px;background:#fff0f0;border:1px solid #f0cece;border-radius:6px;color:#cc0000;font-size:12px;font-weight:600;cursor:pointer;text-align:left" onclick="applyRoute('${f.id}','${suggestion.replace(/'/g,"\\'")}')">↩ ${suggestion}</button>` : ''}
    </div>
    <div class="grid2">
      <div class="field"><label>Km-Stand</label><input type="number" class="f-km" value="${f.km||''}" oninput="save()"></div>
      <div class="field"><label>Pers.</label><input type="number" class="f-personen" value="${f.personen||''}" oninput="save(); autoSumPersonen()"></div>
    </div>`;
  return div;
}

function applyRoute(id, route) {
  const card = document.querySelector(`.fahrt-card[data-id="${id}"]`);
  if (!card) return;
  card.querySelector('.f-strecke').value = route;
  save();
  renderFahrten();
}

function addFahrt() {
  save();
  data.fahrten.push(newFahrt());
  renderFahrten();
  save();
}

function deleteFahrt(id) {
  if (data.fahrten.length <= 1) return;
  save();
  data.fahrten = data.fahrten.filter(f => String(f.id) !== String(id));
  renderFahrten();
  save();
}

// ── Preview ───────────────────────────────────────────────────────────────────
function renderPreview() {
  const rows = [
    ['Datum', data.datum], ['Fplo', data.fplo], ['Umlauf', data.umlauf],
    ['Fahrauftrag', data.fahrauftrag], ['Kennzeichen', data.kennzeichen],
    ['Sitz+Stehplätze', data.sitzplaetze], ['Beginn', data.beginn],
    ['Ende', data.ende], ['Gesamtzeit', getGesamtzeit()],
    ['Km-Anfang', data.km_anfang], ['Km-Ende', data.km_ende],
    ['Km-Gesamt', getKmGesamt()], ['Bef. Personen', data.bef_personen],
  ];
  document.getElementById('preview-kopf').innerHTML =
    rows.filter(r => r[1]).map(r =>
      `<div class="preview-row"><span class="pk">${r[0]}</span><span class="pv">${r[1]}</span></div>`
    ).join('') || '<div style="color:#aaa;font-size:13px;padding:4px">Keine Daten</div>';

  document.getElementById('preview-fahrten').innerHTML =
    data.fahrten.filter(f => f.strecke || f.abfahrt).map((f, i) =>
      `<div class="fahrt-preview">
        <div class="fp-route">Fahrt ${i+1}: ${f.strecke || '—'}</div>
        <div class="fp-meta">${f.abfahrt||'?'} → ${f.ankunft||'?'} | Km: ${f.km||'—'} | Pers: ${f.personen||'—'}</div>
      </div>`
    ).join('') || '<div style="color:#aaa;font-size:13px;padding:4px">Keine Fahrten</div>';

  document.getElementById('preview-vorkommnisse').innerHTML =
    `<div style="font-size:13px;padding:4px">${data.vorkommnisse || '<span style="color:#aaa">Keine</span>'}</div>`;
}

// ── Save/Reset ────────────────────────────────────────────────────────────────
function saveManual() {
  save();
  const btn = document.getElementById('btn-save');
  btn.textContent = '✓ GESPEICHERT';
  btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'SPEICHERN'; btn.classList.remove('saved'); }, 2000);
}

function resetAll() {
  if (!confirm('Alle Daten löschen und neu beginnen?')) return;
  data = defaultData();
  localStorage.removeItem(KEY);
  fillDOM();
  showToast('Formular zurückgesetzt');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);

// IndexedDB: PDF-Bytes dauerhaft speichern
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('sev_db', 1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('files');
    r.onsuccess = e => res(e.target.result);
    r.onerror = rej;
  });
}
function uint8ToBase64(bytes) {
  let binary = '';
  const chunk = 8192;
  for (let i = 0; i < bytes.length; i += chunk)
    binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
  return btoa(binary);
}
function base64ToUint8(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

async function savePDFtoDB(bytes, name) {
  const db = await openDB();
  const tx = db.transaction('files', 'readwrite');
  tx.objectStore('files').put(bytes, 'template');
  tx.objectStore('files').put(name, 'templateName');
}
async function loadPDFfromDB() {
  try {
    const db = await openDB();
    return new Promise(res => {
      const tx = db.transaction('files', 'readonly');
      const store = tx.objectStore('files');
      const rBytes = store.get('template');
      const rName  = store.get('templateName');
      let bytes, name, bytesReady = false, nameReady = false;
      function check() { if (bytesReady && nameReady) res(bytes ? {bytes, name} : null); }
      rBytes.onsuccess  = e => { bytes = e.target.result; bytesReady = true; check(); };
      rName.onsuccess   = e => { name  = e.target.result; nameReady  = true; check(); };
      rBytes.onerror = () => { bytesReady = true; check(); };
      rName.onerror  = () => { nameReady  = true; check(); };
    });
  } catch(e) { return null; }
}

function setPDFLabel(name, isCustom = true) {
  const label = document.getElementById('pdf-upload-label');
  const box   = document.getElementById('pdf-upload-box');
  const btnReset = document.getElementById('btn-reset-vorlage');
  label.textContent = '✓ ' + name;
  box.style.borderColor = '#00c8e8';
  box.style.color = '#00c8e8';
  if (btnReset) btnReset.style.display = isCustom ? 'block' : 'none';
}

function resetVorlage() {
  localStorage.removeItem('sev_pdf_b64');
  localStorage.removeItem('sev_pdf_name');
  uploadedPDFBytes = null;
  // IndexedDB leeren
  openDB().then(db => {
    const tx = db.transaction('files', 'readwrite');
    tx.objectStore('files').delete('template');
    tx.objectStore('files').delete('templateName');
  });
  const label = document.getElementById('pdf-upload-label');
  const box   = document.getElementById('pdf-upload-box');
  const btnReset = document.getElementById('btn-reset-vorlage');
  label.textContent = '✓ Standard-Vorlage aktiv · Antippen zum Ersetzen';
  box.style.borderColor = '#00c8e8';
  box.style.color = '#00c8e8';
  if (btnReset) btnReset.style.display = 'none';
  showToast('Standard-Vorlage wiederhergestellt');
}

function loadPDF(input) {
  const file = input.files[0];
  if (!file) return;
  showToast('Wird geladen…');
  const reader = new FileReader();
  reader.onload = function(e) {
    uploadedPDFBytes = new Uint8Array(e.target.result);
    // Synchron in localStorage speichern → überlebt iOS-Reload
    try {
      const b64 = uint8ToBase64(uploadedPDFBytes);
      localStorage.setItem('sev_pdf_b64', b64);
      localStorage.setItem('sev_pdf_name', file.name);
    } catch(err) { console.warn('localStorage voll:', err); }
    // Zusätzlich in IndexedDB
    savePDFtoDB(uploadedPDFBytes, file.name);
    setPDFLabel(file.name);
    showToast('PDF geladen: ' + file.name);
  };
  reader.readAsArrayBuffer(file);
}

async function generatePDF() {
  save();
  showToast('PDF wird erstellt…');
  try {
    const { PDFDocument, rgb, StandardFonts } = PDFLib;

    let pdfBytes;
    if (uploadedPDFBytes) {
      pdfBytes = uploadedPDFBytes;
    } else {
      pdfBytes = Uint8Array.from(atob(PDF_B64), c => c.charCodeAt(0));
    }
    const pdfDoc = await PDFDocument.load(pdfBytes);
    const page = pdfDoc.getPages()[0];
    const { width, height } = page.getSize(); // PDF coords: y=0 bottom

    const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
    const fontBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);



    function txt(text, x, y, size=9, bold=false) {
      if (!text) return;
      // PDF y=0 is bottom; form_structure y=0 is top → convert
      // PDF height = 935.6 (from structure analysis)
      const pdfY = height - y - size;
      page.drawText(String(text), {
        x, y: pdfY, size, font: bold ? fontBold : font,
        color: rgb(0,0,0)
      });
    }

    // Detect PDF type by page size
    const pdfW = Math.round(page.getWidth());
    const isNewFormat = pdfW < 620; // New format: 595pt, Old: 661pt

    if (isNewFormat) {
      // NEW FORMAT (DB SEV GmbH Fahrbericht, 595x842)
      txt(data.fplo,         109, 128, 11);   // Fplo Nummer
      txt(data.datum,        358, 112, 12, true); // Datum
      txt(data.umlauf,        87, 160, 11);   // Umlaufnummer
      txt(data.bef_personen, 350, 196, 11);   // beförderte Personen
      txt(data.beginn,        103, 248, 11);   // Beginn Uhr
      txt(data.ende,          103, 282, 11);   // Ende Uhr
      txt(getGesamtzeit(),    103, 316, 11);   // Gesamtzeit
      txt(data.km_ende,      370, 248, 11);   // Km-Ende
      txt(data.km_anfang,    370, 282, 11);   // Km-Anfang
      txt(getKmGesamt(),     370, 316, 11);   // Km-Gesamt
      txt(data.sitzplaetze,  456, 248, 11);   // Sitz+Stehplätze
      txt(data.kennzeichen,  452, 314, 10);   // amtl. Kennzeichen
      if (data.vorkommnisse) txt(data.vorkommnisse, 13, 803, 9);
    } else {
      // OLD FORMAT (DB Regio, 661x936)
      txt(data.datum, 330, 205, 10);
      txt(data.beginn, 110, 382, 12);
      txt(data.ende, 110, 419, 12);
      txt(getGesamtzeit(), 110, 456, 12);
      txt(data.km_ende, 295, 382, 12);
      txt(data.km_anfang, 300, 419, 12);
      txt(getKmGesamt(), 308, 456, 12);
      txt(data.sitzplaetze, 458, 294, 12);
      txt(data.kennzeichen, 437, 342, 10);
      txt(data.bef_personen, 440, 410, 12);
      if (data.vorkommnisse) txt(data.vorkommnisse, 26, 877, 10);
    }

    // Fahrten-Tabelle
    const rowTops = isNewFormat
      ? [394,410,426,442,459,475,491,507,523,540,556,572,588,604,620,637,653,669,685,701]
      : [550,564,578,592,606,620,635,649,663,678,692,706,721,735,749,764,778,807];
    const cols = isNewFormat
      ? {abfahrt:24, strecke:88, ankunft:387, km:458, pers:524}
      : {abfahrt:26, strecke:88, ankunft:365, km:427, pers:499};
    const fSize = isNewFormat ? 9 : 9;
    // override txt for fahrten to use col positions
    function tRow(text, x, y) { if(text) txt(text, x, y, fSize); }

    data.fahrten.forEach((f, i) => {
      if (i >= rowTops.length) return;
      const y = rowTops[i];
      tRow(f.abfahrt, cols.abfahrt, y);
      tRow(f.strecke, cols.strecke, y);
      tRow(f.ankunft, cols.ankunft, y);
      tRow(f.km, cols.km, y);
      tRow(f.personen, cols.pers, y);
    });

    const filled = await pdfDoc.save();
    const blob = new Blob([filled], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const datum = data.datum || new Date().toISOString().slice(0,10);
    a.href = url; a.download = `SEV_Fahrtbericht_${datum}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('PDF heruntergeladen ✓');
  } catch(e) {
    console.error(e);
    showToast('Fehler: ' + e.message);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
fillDOM();
// PDF wiederherstellen: zuerst localStorage (iOS-sicher), dann IndexedDB
const _b64 = localStorage.getItem('sev_pdf_b64');
const _pdfName = localStorage.getItem('sev_pdf_name');
if (_b64) {
  try {
    uploadedPDFBytes = base64ToUint8(_b64);
    setPDFLabel(_pdfName || 'Eigene Vorlage', true);
  } catch(e) {
    localStorage.removeItem('sev_pdf_b64');
    loadPDFfromDB().then(r => { if (r?.bytes) { uploadedPDFBytes = r.bytes; setPDFLabel(r.name || 'Eigene Vorlage', true); }});
  }
} else {
  loadPDFfromDB().then(r => {
    if (r?.bytes) { uploadedPDFBytes = r.bytes; setPDFLabel(r.name || 'Eigene Vorlage', true); }
    // sonst: Standard-Vorlage (PDF_B64) wird automatisch genutzt
  });
}
